name: Dependency watch

on:
  schedule:
    - cron: "23 4 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  go-patch:
    runs-on: ubuntu-24.04
    steps:
      - name: Check out source
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4

      - name: Check Go security patch
        run: python3 scripts/check-go-patch.py
